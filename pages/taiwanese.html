<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台語作品 | 比卡 Bika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Caveat:wght@400;500;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .tw-hero {
      min-height: 55vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 9rem 2rem 4rem;
    }

    .tw-hero-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.8rem;
    }

    .tw-hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      font-weight: 300;
      color: var(--text);
      line-height: 0.92;
      margin-bottom: 1.4rem;
    }

    .tw-hero-taigi {
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 0.7rem;
    }

    .tw-hero-sub {
      font-size: 0.9rem;
      color: var(--text-2);
      line-height: 1.8;
    }

    .tw-section {
      padding: 5rem 3rem 8rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .tw-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.8rem;
    }

    .tw-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1.3rem;
      overflow: hidden;
      transition: transform 0.35s ease, box-shadow 0.35s ease,
                  border-color 0.35s ease, background 0.35s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .tw-card:hover {
      background: var(--card-bg-h);
      border-color: var(--border-h);
      transform: translateY(-7px);
      box-shadow: var(--shadow), 0 0 45px var(--accent-glow);
    }

    .tw-card-preview {
      height: 170px;
      background:
        radial-gradient(ellipse at 50% 60%, rgba(247,228,168,0.42) 0%, transparent 58%),
        radial-gradient(ellipse at 20% 30%, rgba(247,168,168,0.32) 0%, transparent 42%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      overflow: hidden;
      transition: transform 0.5s ease;
    }

    .tw-card:hover .tw-card-preview { transform: scale(1.06); }

    .tw-card-body { padding: 1.4rem 1.5rem 1.7rem; }

    .tw-card-body h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .tw-taigi-label {
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.07em;
      margin-bottom: 0.65rem;
    }

    .tw-card-body p {
      font-size: 0.78rem;
      color: var(--text-2);
      line-height: 1.65;
      margin-bottom: 1.2rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-2);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.15rem;
      transition: color 0.25s, border-color 0.25s;
    }

    .back-link:hover { color: var(--accent); border-color: var(--accent); }

    @media (max-width: 900px) { .tw-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) {
      .tw-section { padding: 4rem 1.2rem 6rem; }
      .tw-grid    { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <nav class="nav">
    <div class="nav-logo">
      <span class="logo-zh">比卡</span>
      <span class="logo-sep">/</span>
      <span class="logo-en">Bika</span>
    </div>
    <div class="nav-links">
      <a href="../index.html" data-zh="← 返回主頁" data-en="← Home">← 返回主頁</a>
    </div>
    <div class="nav-controls">
      <button class="lang-toggle" id="langToggle" aria-label="Toggle language">
        <span class="lang-zh">EN</span>
        <span class="lang-en">中</span>
      </button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="icon-dark">☀</span>
        <span class="icon-light">✦</span>
      </button>
    </div>
  </nav>

  <section class="tw-hero">
    <div>
      <p class="tw-hero-eyebrow">台語作品 · Taiwanese Works</p>
      <h1 class="tw-hero-title">台語創作</h1>
      <p class="tw-hero-taigi">Tâi-gí Tsòng-tsok</p>
      <p class="tw-hero-sub"
         data-zh="用台語，唱出心底的故事"
         data-en="Singing heart stories in Taiwanese">
        用台語，唱出心底的故事
      </p>
    </div>
  </section>

  <section class="tw-section">
    <div class="tw-grid">

      <div class="tw-card reveal">
        <div class="tw-card-preview">🎵</div>
        <div class="tw-card-body">
          <h3 data-zh="台語歌曲 1" data-en="Taiwanese Song 1">台語歌曲 1</h3>
          <p class="tw-taigi-label">Tâi-gí Si-koa 1</p>
          <p data-zh="即將上傳" data-en="Coming soon">即將上傳</p>
          <button class="card-btn" style="opacity:0.55;cursor:default"
                  data-zh="即將推出" data-en="Coming Soon">即將推出</button>
        </div>
      </div>

      <div class="tw-card reveal">
        <div class="tw-card-preview">🎶</div>
        <div class="tw-card-body">
          <h3 data-zh="台語歌曲 2" data-en="Taiwanese Song 2">台語歌曲 2</h3>
          <p class="tw-taigi-label">Tâi-gí Si-koa 2</p>
          <p data-zh="即將上傳" data-en="Coming soon">即將上傳</p>
          <button class="card-btn" style="opacity:0.55;cursor:default"
                  data-zh="即將推出" data-en="Coming Soon">即將推出</button>
        </div>
      </div>

      <div class="tw-card reveal">
        <div class="tw-card-preview">🎸</div>
        <div class="tw-card-body">
          <h3 data-zh="台語歌曲 3" data-en="Taiwanese Song 3">台語歌曲 3</h3>
          <p class="tw-taigi-label">Tâi-gí Si-koa 3</p>
          <p data-zh="即將上傳" data-en="Coming soon">即將上傳</p>
          <button class="card-btn" style="opacity:0.55;cursor:default"
                  data-zh="即將推出" data-en="Coming Soon">即將推出</button>
        </div>
      </div>

    </div>
  </section>

  <footer class="footer">
    <a href="../index.html" class="back-link">
      ← <span data-zh="返回主頁" data-en="Back to Home">返回主頁</span>
    </a>
    &nbsp;&nbsp;·&nbsp;&nbsp;
    <span>© 2025 比卡 Bika</span>
  </footer>

  <script src="../js/stars.js"></script>
  <script>
    const html = document.documentElement;

    const savedTheme = localStorage.getItem('bika-theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('bika-theme', next);
    });

    let currentLang = localStorage.getItem('bika-lang') || 'zh-TW';

    function applyLang(lang) {
      html.setAttribute('lang', lang);
      document.querySelectorAll('[data-zh],[data-en]').forEach(el => {
        const val = lang === 'zh-TW' ? el.dataset.zh : el.dataset.en;
        if (val !== undefined) el.textContent = val;
      });
    }

    applyLang(currentLang);

    document.getElementById('langToggle').addEventListener('click', () => {
      currentLang = currentLang === 'zh-TW' ? 'en' : 'zh-TW';
      localStorage.setItem('bika-lang', currentLang);
      applyLang(currentLang);
    });

    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  </script>
</body>
</html>
