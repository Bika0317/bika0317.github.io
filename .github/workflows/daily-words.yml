name: Daily Word Generator

on:
  schedule:
    - cron: '0 16 * * *'  # 00:00 台灣時間 (UTC+8)
  workflow_dispatch:       # 允許手動觸發測試

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Generate new words
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-word.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/words/
          git diff --staged --quiet || git commit -m "chore: daily words $(date -u +%Y-%m-%d)"
          git push
